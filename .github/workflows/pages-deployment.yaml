# Deploy to Cloudflare Pages on every push to main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    name: Deploy to Cloudflare Pages

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Deploy to Cloudflare Pages
        run: |
          npm install -g wrangler@latest
          wrangler pages deploy build --project-name=ai-tutor-mvp --api-token=${{ secrets.CLOUDFLARE_API_TOKEN }} --account-id=${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
